<section class="login-card" aria-label="Phone verification login">
  <!-- Hero area -->
  <div class="login-hero">
    <div class="hero-bubbles" aria-hidden="true">
      <span class="bubble b1">💬</span>
      <span class="bubble b2">❤️</span>
      <span class="bubble b3">🎧</span>
      <span class="bubble b4">✨</span>
      <span class="bubble b5">😊</span>
    </div>
    <div class="brand-mark-lg">
      <img src="assets/brand/logo.png" alt="happyga logo" />
    </div>
    <h1 class="hero-title">happyga</h1>
    <p class="hero-tagline">Talk. Connect. Feel happy.</p>
  </div>

  <!-- Features strip -->
  <div class="features-strip">
    <div class="feature-pill"><span class="feature-icon">🎙</span> Voice Calls</div>
    <div class="feature-pill"><span class="feature-icon">🔒</span> Private</div>
    <div class="feature-pill"><span class="feature-icon">⚡</span> Instant</div>
  </div>

  <!-- Login form -->
  <div class="login-form-area">
    <p class="login-prompt">Enter your phone number to get started</p>

    <form id="phoneForm" class="form-grid">
      <div class="phone-row">
        <span class="country-flag">🇮🇳</span>
        <span class="country-code">+91</span>
        <input id="phoneInput" type="tel" inputmode="numeric" maxlength="10" placeholder="9876543210" required />
      </div>
      <button id="sendOtpBtn" class="primary-btn" type="submit">
        <span class="btn-text">Send OTP</span>
        <span class="btn-arrow">→</span>
      </button>
    </form>

    <form id="otpForm" class="form-grid hidden" aria-live="polite">
      <label class="field-label" for="otpInput">Enter the 6-digit OTP</label>
      <input id="otpInput" class="otp-input" type="text" inputmode="numeric" maxlength="6" placeholder="• • • • • •" required />
      <p id="otpHint" class="hint-text"></p>
      <button id="verifyOtpBtn" class="primary-btn" type="submit">
        <span class="btn-text">Verify & Continue</span>
        <span class="btn-arrow">→</span>
      </button>
      <button id="resendOtpBtn" class="ghost-btn" type="button">Resend OTP</button>
    </form>

    <p id="statusText" class="status-text" role="status"></p>
  </div>

  <p class="login-footer">By continuing, you agree to our Terms & Privacy Policy</p>
</section>

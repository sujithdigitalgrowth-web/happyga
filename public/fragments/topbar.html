<header class="topbar">
  <div class="topbar-row">
    <div class="brand-lockup" aria-label="happyga brand">
      <div class="brand-mark">
        <img src="assets/brand/logo.png" alt="happyga logo" />
      </div>
      <p class="brand-name">happyga</p>
    </div>
    <div class="topbar-actions">
      <div class="coins-wrapper">
        <button id="coinsBtn" class="coins-btn" type="button" aria-label="Open coin plans">
          <img class="coins-btn-image" src="assets/icons/coins-button.svg" alt="Coins" />
        </button>
        <span id="coinsBadge" class="coins-badge">Coins = 0</span>
      </div>
    </div>
  </div>
  <div class="topbar-meta" aria-live="polite">
    <p id="walletBalanceText" class="wallet-balance-text">Loading coin balance...</p>
    <p id="callStatusText" class="call-status-text">Demo calls reserve 6 coins before connecting.</p>
  </div>
</header>

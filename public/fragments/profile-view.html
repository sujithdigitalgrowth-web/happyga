<section id="profileView" class="feed view-panel hidden" data-view="profile" aria-label="Profile settings">
  <div class="settings-card card">
    <div class="section-head">
      <p class="eyebrow">Your Profile</p>
      <h2>Account options</h2>
    </div>
    <div class="profile-summary">
      <p id="profileSummaryText" class="profile-summary-text">Rahul, 26 • Coffee dates, long drives, tech talks</p>
    </div>
    <div class="profile-menu">
      <button id="personalDetailsBtn" class="profile-menu-item" type="button">
        <span>
          <strong>Personal details</strong>
          <small>Change your name, age, and interests</small>
        </span>
        <span class="menu-chevron" aria-hidden="true">›</span>
      </button>

      <div id="listenerDashboard" class="listener-dashboard card" style="display:none;">
        <h3>Listener Dashboard</h3>
        <div class="dashboard-stats">
          <p>Coins Earned: <strong id="coinsEarned">0</strong></p>
          <p>Available Coins: <strong id="availableCoins">0</strong></p>
        </div>
        <button id="withdrawBtn" class="primary-btn" type="button">Withdraw</button>
        <div id="withdrawMsg" class="withdraw-msg"></div>
        <div id="withdrawalHistory">
          <h4>Withdrawal History</h4>
          <ul id="withdrawalList"></ul>
        </div>
      </div>

      <button id="listenerProfileBtn" class="profile-menu-item" type="button">
        <span>
          <strong>Join as a listener</strong>
          <small>Create a listener profile and earn 40% of user coin spend</small>
        </span>
        <span class="menu-chevron" aria-hidden="true">›</span>
      </button>
      <button id="referFriendBtn" class="profile-menu-item" type="button">
        <span>
          <strong>Refer a friend</strong>
          <small>Invite friends and earn bonus coins</small>
        </span>
        <span class="menu-chevron" aria-hidden="true">›</span>
      </button>
    </div>
    <button id="logoutBtn" class="logout-btn logout-bottom" type="button">Log Out</button>
  </div>
</section>
